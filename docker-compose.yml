services:
  vllm:
    image: vllm/vllm-openai:${VLLM_TAG:-v0.6.3}
    container_name: vllm-server
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ${HF_CACHE:-~/.cache/huggingface}:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    command: >
      --model ${MODEL:-Qwen/Qwen2.5-3B-Instruct-AWQ}
      --quantization ${QUANTIZATION:-awq}
      --max-model-len ${MAX_MODEL_LEN:-4096}
      --gpu-memory-utilization ${GPU_MEM_UTIL:-0.80}
      --max-num-seqs ${MAX_NUM_SEQS:-8}
      --enforce-eager
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
